name: Build Android APK (Cloud)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Uses the branch selected in "Run workflow".
          ref: ${{ github.ref }}

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Show toolchain versions
        run: |
          echo "Building ref: $GITHUB_REF"
          echo "Building SHA: $GITHUB_SHA"
          flutter --version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify app entrypoint is not Flutter demo
        run: |
          if rg -n "You have pushed the button this many times" lib/main.dart; then
            echo "Detected Flutter counter demo in lib/main.dart. Aborting build."
            exit 1
          fi

      - name: Ensure Android host project exists
        run: |
          if [ ! -f android/app/build.gradle.kts ]; then
            flutter create --platforms=android --project-name plant_identifier_app /tmp/plant_identifier_bootstrap
            mkdir -p android
            rsync -a --ignore-existing /tmp/plant_identifier_bootstrap/android/ android/
          fi

      - name: Force unique Android applicationId for test installs
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/applicationId = "com.example.plant_identifier_app"/applicationId = "com.clawdiabott.plantidentifier"/' android/app/build.gradle.kts || true
          fi

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: plant-identifier-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
