name: Build Android APK (Cloud)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to build'
        required: false
        default: 'cursor/plant-identification-app-834f'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref != '' && github.event.inputs.ref || 'cursor/plant-identification-app-834f' }}

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Show toolchain versions
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Ensure Android host project exists
        run: flutter create --platforms=android --overwrite .

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: plant-identifier-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
