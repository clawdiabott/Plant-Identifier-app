name: plant_identifier_app
description: >
  Cross-platform Flutter app for plant identification, disease detection,
  and care guidance using on-device ML + API enrichment.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2

  # Image capture and media input.
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # On-device ML inference and image preprocessing.
  tflite_flutter: ^0.11.0
  image: ^4.2.0
  google_mlkit_image_labeling: ^0.13.0

  # Networking + data parsing.
  http: ^1.2.2
  xml: ^6.5.0

  # Local persistence and caching.
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Device context and permissions.
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # Optional cloud integrations.
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  firebase_analytics: ^11.2.0
  firebase_storage: ^12.2.0
  cloud_firestore: ^5.4.0

  # Background sync.
  workmanager: ^0.5.2

  # Utilities.
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/labels/
    - assets/images/
